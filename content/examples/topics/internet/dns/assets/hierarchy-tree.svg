<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 344" font-family="-apple-system, system-ui, sans-serif">
  <text x="330" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">The domain name space — an inverted tree</text>

  <!-- edges (drawn first, behind nodes) -->
  <g stroke="#c9ccd1" stroke-width="1.5" fill="none">
    <line x1="330" y1="80" x2="160" y2="128"/>
    <line x1="330" y1="80" x2="330" y2="128"/>
    <line x1="330" y1="80" x2="500" y2="128"/>
    <line x1="160" y1="162" x2="160" y2="206"/>
    <line x1="330" y1="162" x2="330" y2="206"/>
    <line x1="160" y1="240" x2="160" y2="284"/>
  </g>

  <!-- root -->
  <rect x="282" y="46" width="96" height="34" rx="8" fill="#eef2f7" stroke="#9aa4b2"/>
  <text x="330" y="68" text-anchor="middle" font-size="14" fill="#1f2328">root ( . )</text>

  <!-- TLDs -->
  <rect x="112" y="128" width="96" height="34" rx="8" fill="#e6effe" stroke="#2563eb"/>
  <text x="160" y="150" text-anchor="middle" font-size="14" fill="#1f2328">com</text>
  <rect x="282" y="128" width="96" height="34" rx="8" fill="#e6effe" stroke="#2563eb"/>
  <text x="330" y="150" text-anchor="middle" font-size="14" fill="#1f2328">org</text>
  <rect x="452" y="128" width="96" height="34" rx="8" fill="#e6effe" stroke="#2563eb"/>
  <text x="500" y="150" text-anchor="middle" font-size="14" fill="#1f2328">uk</text>

  <!-- domains -->
  <rect x="112" y="206" width="96" height="34" rx="8" fill="#eaf4ee" stroke="#2f6f4f"/>
  <text x="160" y="228" text-anchor="middle" font-size="14" fill="#1f2328">example</text>
  <rect x="282" y="206" width="96" height="34" rx="8" fill="#eaf4ee" stroke="#2f6f4f"/>
  <text x="330" y="228" text-anchor="middle" font-size="14" fill="#1f2328">wikipedia</text>

  <!-- host -->
  <rect x="112" y="284" width="96" height="34" rx="8" fill="#fdf3e7" stroke="#d6a15a"/>
  <text x="160" y="306" text-anchor="middle" font-size="14" fill="#1f2328">www</text>

  <!-- level labels on the right -->
  <g font-size="11" fill="#8b939e" text-anchor="start">
    <text x="560" y="68">root</text>
    <text x="560" y="150">top-level domain</text>
    <text x="560" y="228">domain</text>
    <text x="228" y="306">host</text>
  </g>

  <text x="330" y="338" text-anchor="middle" font-size="12" fill="#6b7280">www.example.com — read right to left, following the path down from the root</text>
</svg>

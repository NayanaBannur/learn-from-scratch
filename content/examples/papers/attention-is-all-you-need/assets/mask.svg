<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="ui-sans-serif, system-ui, sans-serif">
  <text x="16" y="24" font-size="13" font-weight="700" fill="#3a3f45">The causal mask: a token may attend only to itself and earlier tokens</text>

  <!-- column header -->
  <text x="330" y="52" font-size="10.5" font-weight="700" fill="#3a55a0" text-anchor="middle">key position (attended to) →</text>
  <g font-size="10" text-anchor="middle" fill="#6b7280">
    <text x="164" y="74">1</text><text x="212" y="74">2</text><text x="260" y="74">3</text><text x="308" y="74">4</text><text x="356" y="74">5</text>
  </g>

  <!-- row header -->
  <text x="40" y="200" font-size="10.5" font-weight="700" fill="#2f7d52" text-anchor="middle" transform="rotate(-90 40 200)">query position (attending) →</text>
  <g font-size="10" text-anchor="middle" fill="#6b7280">
    <text x="120" y="103">1</text><text x="120" y="151">2</text><text x="120" y="199">3</text><text x="120" y="247">4</text><text x="120" y="295">5</text>
  </g>

  <!-- grid: row i (0..4), col j (0..4). allowed if j <= i -->
  <!-- row 1 -->
  <g font-size="12" text-anchor="middle">
    <rect x="142" y="84" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="164" y="108" fill="#2f7d52">✓</text>
    <rect x="190" y="84" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="212" y="108" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="238" y="84" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="260" y="108" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="286" y="84" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="308" y="108" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="334" y="84" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="356" y="108" font-size="10" fill="#aeb3ba">−∞</text>
    <!-- row 2 -->
    <rect x="142" y="132" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="164" y="156" fill="#2f7d52">✓</text>
    <rect x="190" y="132" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="212" y="156" fill="#2f7d52">✓</text>
    <rect x="238" y="132" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="260" y="156" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="286" y="132" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="308" y="156" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="334" y="132" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="356" y="156" font-size="10" fill="#aeb3ba">−∞</text>
    <!-- row 3 -->
    <rect x="142" y="180" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="164" y="204" fill="#2f7d52">✓</text>
    <rect x="190" y="180" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="212" y="204" fill="#2f7d52">✓</text>
    <rect x="238" y="180" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="260" y="204" fill="#2f7d52">✓</text>
    <rect x="286" y="180" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="308" y="204" font-size="10" fill="#aeb3ba">−∞</text>
    <rect x="334" y="180" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="356" y="204" font-size="10" fill="#aeb3ba">−∞</text>
    <!-- row 4 -->
    <rect x="142" y="228" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="164" y="252" fill="#2f7d52">✓</text>
    <rect x="190" y="228" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="212" y="252" fill="#2f7d52">✓</text>
    <rect x="238" y="228" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="260" y="252" fill="#2f7d52">✓</text>
    <rect x="286" y="228" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="308" y="252" fill="#2f7d52">✓</text>
    <rect x="334" y="228" width="44" height="38" rx="4" fill="#f0f1f3" stroke="#cfd3d8"/><text x="356" y="252" font-size="10" fill="#aeb3ba">−∞</text>
    <!-- row 5 -->
    <rect x="142" y="276" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="164" y="300" fill="#2f7d52">✓</text>
    <rect x="190" y="276" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="212" y="300" fill="#2f7d52">✓</text>
    <rect x="238" y="276" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="260" y="300" fill="#2f7d52">✓</text>
    <rect x="286" y="276" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="308" y="300" fill="#2f7d52">✓</text>
    <rect x="334" y="276" width="44" height="38" rx="4" fill="#e6f5ec" stroke="#5fae82"/><text x="356" y="300" fill="#2f7d52">✓</text>
  </g>

  <!-- legend -->
  <rect x="418" y="132" width="18" height="18" rx="3" fill="#e6f5ec" stroke="#5fae82"/>
  <text x="442" y="146" font-size="10" fill="#3a3f45">allowed (kept)</text>
  <rect x="418" y="160" width="18" height="18" rx="3" fill="#f0f1f3" stroke="#cfd3d8"/>
  <text x="442" y="174" font-size="10" fill="#3a3f45">masked: score set</text>
  <text x="442" y="187" font-size="10" fill="#3a3f45">to −∞ → weight 0</text>
</svg>

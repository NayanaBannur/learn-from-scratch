<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="sk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#6b7280" />
    </marker>
    <marker id="skx" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#d6a93a" />
    </marker>
  </defs>

  <text x="16" y="24" font-size="13" font-weight="700" fill="#3a3f45">Two stacks of 6 layers: the encoder reads, the decoder writes</text>

  <!-- ENCODER -->
  <text x="140" y="52" font-size="11" font-weight="700" fill="#3a55a0" text-anchor="middle">ENCODER</text>
  <!-- input -->
  <rect x="52" y="330" width="176" height="40" rx="6" fill="#eef2f7" stroke="#9aa0a6"/>
  <text x="140" y="349" font-size="10" fill="#3a3f45" text-anchor="middle">input embedding</text>
  <text x="140" y="363" font-size="10" fill="#3a3f45" text-anchor="middle">+ positional encoding</text>
  <line x1="140" y1="330" x2="140" y2="300" stroke="#6b7280" stroke-width="1.2" marker-end="url(#sk)"/>

  <!-- encoder layer box -->
  <rect x="52" y="150" width="176" height="146" rx="8" fill="#e8eefc" stroke="#7d97d4" stroke-width="1.6"/>
  <text x="140" y="170" font-size="10.5" font-weight="700" fill="#3a55a0" text-anchor="middle">× 6 layers</text>
  <rect x="70" y="182" width="140" height="42" rx="5" fill="#fff" stroke="#7d97d4"/>
  <text x="140" y="200" font-size="10" fill="#3a55a0" text-anchor="middle">multi-head</text>
  <text x="140" y="214" font-size="10" fill="#3a55a0" text-anchor="middle">self-attention</text>
  <rect x="70" y="234" width="140" height="42" rx="5" fill="#fff" stroke="#7d97d4"/>
  <text x="140" y="252" font-size="10" fill="#3a55a0" text-anchor="middle">feed-forward</text>
  <text x="140" y="266" font-size="10" fill="#3a55a0" text-anchor="middle">network</text>

  <!-- DECODER -->
  <text x="460" y="52" font-size="11" font-weight="700" fill="#2f7d52" text-anchor="middle">DECODER</text>
  <!-- output input -->
  <rect x="372" y="330" width="176" height="40" rx="6" fill="#eef2f7" stroke="#9aa0a6"/>
  <text x="460" y="349" font-size="10" fill="#3a3f45" text-anchor="middle">output so far (shifted)</text>
  <text x="460" y="363" font-size="10" fill="#3a3f45" text-anchor="middle">+ positional encoding</text>
  <line x1="460" y1="330" x2="460" y2="300" stroke="#6b7280" stroke-width="1.2" marker-end="url(#sk)"/>

  <!-- decoder layer box -->
  <rect x="372" y="118" width="176" height="178" rx="8" fill="#e6f5ec" stroke="#5fae82" stroke-width="1.6"/>
  <text x="460" y="138" font-size="10.5" font-weight="700" fill="#2f7d52" text-anchor="middle">× 6 layers</text>
  <rect x="390" y="150" width="140" height="38" rx="5" fill="#fff" stroke="#5fae82"/>
  <text x="460" y="166" font-size="10" fill="#2f7d52" text-anchor="middle">masked</text>
  <text x="460" y="179" font-size="10" fill="#2f7d52" text-anchor="middle">self-attention</text>
  <rect x="390" y="196" width="140" height="38" rx="5" fill="#fff8e8" stroke="#d6a93a"/>
  <text x="460" y="212" font-size="10" fill="#8a6d1f" text-anchor="middle">encoder–decoder</text>
  <text x="460" y="225" font-size="10" fill="#8a6d1f" text-anchor="middle">attention</text>
  <rect x="390" y="242" width="140" height="34" rx="5" fill="#fff" stroke="#5fae82"/>
  <text x="460" y="263" font-size="10" fill="#2f7d52" text-anchor="middle">feed-forward network</text>

  <!-- cross-attention arrow from encoder to decoder's middle sublayer -->
  <path d="M228,200 C280,205 300,215 388,215" stroke="#d6a93a" stroke-width="1.8" fill="none" marker-end="url(#skx)"/>
  <text x="300" y="196" font-size="9" fill="#8a6d1f" text-anchor="middle">encoder output</text>

  <!-- decoder up to output -->
  <line x1="460" y1="118" x2="460" y2="96" stroke="#6b7280" stroke-width="1.2" marker-end="url(#sk)"/>
  <rect x="372" y="60" width="176" height="36" rx="6" fill="#eef2f7" stroke="#9aa0a6"/>
  <text x="460" y="77" font-size="10" fill="#3a3f45" text-anchor="middle">linear + softmax →</text>
  <text x="460" y="90" font-size="10" fill="#3a3f45" text-anchor="middle">next-word probabilities</text>

  <text x="16" y="392" font-size="10.5" fill="#6b7280">The decoder generates one token at a time, each step reading the whole encoder output.</text>
</svg>
